# QNTX Configuration Example
# Copy this file to ~/.qntx/am.toml and customize as needed
# All settings shown here are defaults - uncomment to override

# ════════════════════════════════════════════════════════════════
# Ground Integration
# https://github.com/teranos/ground
# Ground Control Layer for Agentic AI Systems
# ════════════════════════════════════════════════════════════════

# Path to Ground's database for deferred news delivery.
# When set, QNTX writes cluster lifecycle and Pulse news directly
# to Ground's db so it can deliver them on session Stop.
# Default: "" (disabled)
# ground_db_path = "/Users/you/.local/share/ground/ground.db"

# ════════════════════════════════════════════════════════════════
# Storage Backend (ADR-023, ADR-024)
# Which store holds attestations. Backend chosen at startup.
# ════════════════════════════════════════════════════════════════

[storage]
# Accepted values: "sqlite" (default) or "parquet".
backend = "sqlite"

# ── SQLite backend ──────────────────────────────────────────────

[storage.sqlite]
# SQLite database path (relative to working directory or absolute)
# Default: "qntx.db"
# Environment: QNTX_STORAGE_SQLITE_PATH
path = "qntx.db"

[storage.sqlite.bounded_storage]
# Bounded storage limits prevent unbounded database growth.
# Oldest attestations are deleted when a limit is exceeded; each
# deletion is logged to the storage_events table.

# Maximum attestations per (actor, context) pair. Default: 32
actor_context_limit = 32

# Maximum contexts per actor. Default: 64
actor_contexts_limit = 64

# Maximum actors per entity (subject). Default: 64
entity_actors_limit = 64

# ── Parquet backend (ADR-024) ───────────────────────────────────
# Uncomment when backend = "parquet". Location is a URL:
# "s3://..." for production (AWS Lightsail + S3) or
# "file:///..." for local development. Credentials come from the
# AWS SDK default chain — no keys in this file.
#
# [storage.parquet]
# location = "s3://bucket/prefix"

# ════════════════════════════════════════════════════════════════
# Attestation Distillation (ADR-020)
# Folds old attestations into compressed summaries before deletion.
# Enforcement-path distillation (Rust) is always on.
# Age-based distillation (Go Pulse) requires interval_seconds.
# ════════════════════════════════════════════════════════════════

[distill]
# How often the age-based distill cycle runs (seconds).
# Omit or comment out to disable age-based distillation.
# Default: disabled
# interval_seconds = 300

# Attestations older than this are candidates for distillation.
# Default: 720 (30 days)
# max_age_hours = 720

# Maximum attestations to process per cycle.
# Default: 500
# batch_size = 500

# Log what would be distilled without doing it.
# Default: false
# dry_run = false

# ════════════════════════════════════════════════════════════════
# Server Configuration (Web UI)
# ════════════════════════════════════════════════════════════════

[server]
# HTTP server port for QNTX backend API
# Default: 8770 (development), fallback 7878 (production)
port = 8770

# Frontend dev server port (bun/vite hot-reload)
# Default: 8820
# frontend_port = 8820

# Network interface to bind
# "127.0.0.1" = local only (default), "0.0.0.0" = all interfaces
# Non-loopback requires auth.enabled = true
# Environment: QNTX_BIND_ADDRESS
# bind_address = "127.0.0.1"

# Allowed CORS origins for web UI access
# Default: localhost and 127.0.0.1 (HTTP and HTTPS), plus Tauri desktop app
allowed_origins = [
    "http://localhost",
    "https://localhost",
    "http://127.0.0.1",
    "https://127.0.0.1",
    "tauri://localhost"
]

# Log output color theme: "everforest" or "gruvbox"
# Default: "everforest"
log_theme = "everforest"

# [server.rate_limit]
# Per-IP token bucket limits.
# auth_rate = 2        # /auth/* requests per second
# auth_burst = 5
# ws_rate = 2          # WebSocket upgrades per second
# ws_burst = 10
# write_rate = 20      # POST/PUT/DELETE per second
# write_burst = 40
# read_rate = 60       # GET per second
# read_burst = 120
# public_rate = 10     # /health, static per second
# public_burst = 20

# ════════════════════════════════════════════════════════════════
# Auth (WebAuthn / Passkeys)
# ════════════════════════════════════════════════════════════════

# [auth]
# Biometric passkey gate. Required when server.bind_address is non-loopback.
# enabled = false
# session_expiry_hours = 24
#
# WebAuthn Relying Party ID and Origins. Browsers reject any passkey
# ceremony whose rp.id isn't a registrable domain suffix of the origin's
# effective domain, so these MUST be set for any public deployment.
#   rp_id      — single domain, no scheme, no port: "q.sbvh.nl"
#   rp_origins — full URLs the browser will present: ["https://q.sbvh.nl"]
# Empty rp_id falls back to "localhost"; empty rp_origins falls back to
# http://localhost:<server.port> [+ frontend_port]. Startup fails fast if
# bind_address is non-loopback, auth.enabled is true, and rp_id is empty.
# rp_id = "q.sbvh.nl"
# rp_origins = ["https://q.sbvh.nl"]

# ════════════════════════════════════════════════════════════════
# Pulse Configuration (Async Job System)
# ════════════════════════════════════════════════════════════════

[pulse]
# Number of concurrent job workers
# Default: 1 (sequential processing)
workers = 1

# How often to check for scheduled jobs (seconds)
# Default: 1
ticker_interval_seconds = 1

# Node-level budget limits (enforced per-node against aggregate spend)
# Uses sliding windows (24h/7d/30d) on ai_model_usage table
# Default: $3/day, $7/week, $15/month
# daily_budget_usd = 3.0
# weekly_budget_usd = 7.0
# monthly_budget_usd = 15.0
# cost_per_score_usd = 0.002

# Cluster-level budget (enforced against aggregate spend across all synced nodes)
# Effective limit = average of all nodes' configured cluster limits
# 0 = no cluster enforcement (default)
# cluster_daily_budget_usd = 0
# cluster_weekly_budget_usd = 0
# cluster_monthly_budget_usd = 0

# ════════════════════════════════════════════════════════════════
# Plugin Configuration
# ════════════════════════════════════════════════════════════════

[plugin]
# Plugins to enable. Hot-swap: adding/removing takes effect without restart.
# enabled = ["spindle", "meili"]

# ────────────────────────────────────────────────────────────────
# MeiliSearch Plugin (ADR-015)
# Full-text search provider with typo tolerance, faceted search.
# ────────────────────────────────────────────────────────────────

[meili]
# Remote mode — connect to an external MeiliSearch instance:
# url = "http://localhost:7700"
# key = "your-master-key"

# Embedded mode — spawn a local MeiliSearch subprocess for development.
# Requires `meilisearch` binary in PATH (or specify meili_bin).
# Data persists in ~/.qntx/meili-data/ across restarts.
# embedded = true
# meili_bin = "meilisearch"
# meili_db_path = "/custom/path/to/meili-data"

# ════════════════════════════════════════════════════════════════
# Code Configuration (GitHub & LSP Integration)
# DEPRECATED: planning for removal of these two integrations
# ════════════════════════════════════════════════════════════════

[code.github]
# GitHub personal access token for code review features
# Required for: qntx code pr, qntx code FIX-N
# Environment: QNTX_CODE_GITHUB_TOKEN
# token = "ghp_..."


