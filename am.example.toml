# QNTX Configuration Example
# Copy this file to ~/.qntx/am.toml and customize as needed
# All settings shown here are defaults - uncomment to override

# ════════════════════════════════════════════════════════════════
# Ground Integration
# https://github.com/teranos/ground
# Ground Control Layer for Agentic AI Systems
# ════════════════════════════════════════════════════════════════

# Path to Ground's database for deferred news delivery.
# When set, QNTX writes cluster lifecycle and Pulse news directly
# to Ground's db so it can deliver them on session Stop.
# Default: "" (disabled)
# ground_db_path = "/Users/you/.local/share/ground/ground.db"

# ════════════════════════════════════════════════════════════════
# Database Configuration
# ════════════════════════════════════════════════════════════════

[database]
# SQLite database path (relative to working directory or absolute)
# Default: "qntx.db"
# Environment: QNTX_DATABASE_PATH
path = "qntx.db"

[database.bounded_storage]
# Bounded storage limits prevent unbounded database growth
# These limits are enforced via automatic deletion of oldest attestations
# Deletions are logged to storage_events table for observability

# Maximum attestations per (actor, context) pair
# When exceeded, oldest attestations for this pair are deleted
# Default: 16
actor_context_limit = 16

# Maximum contexts per actor
# When exceeded, oldest context's attestations for this actor are deleted
# Default: 64
actor_contexts_limit = 64

# Maximum actors per entity (subject)
# When exceeded, oldest actor's attestations for this entity are deleted
# Default: 64
entity_actors_limit = 64

# ════════════════════════════════════════════════════════════════
# Server Configuration (Web UI)
# ════════════════════════════════════════════════════════════════

[server]
# HTTP server port for QNTX web UI
# Default: 8770 (development), fallback 7878 (production)
port = 8770

# Network interface to bind
# "127.0.0.1" = local only (default), "0.0.0.0" = all interfaces
# Non-loopback requires auth.enabled = true
# Environment: QNTX_BIND_ADDRESS
# bind_address = "127.0.0.1"

# Allowed CORS origins for web UI access
# Default: localhost and 127.0.0.1 (HTTP and HTTPS), plus Tauri desktop app
allowed_origins = [
    "http://localhost",
    "https://localhost",
    "http://127.0.0.1",
    "https://127.0.0.1",
    "tauri://localhost"
]

# Log output color theme: "everforest" or "gruvbox"
# Default: "everforest"
log_theme = "everforest"

# [server.rate_limit]
# Per-IP token bucket limits.
# auth_rate = 2        # /auth/* requests per second
# auth_burst = 5
# ws_rate = 2          # WebSocket upgrades per second
# ws_burst = 10
# write_rate = 20      # POST/PUT/DELETE per second
# write_burst = 40
# read_rate = 60       # GET per second
# read_burst = 120
# public_rate = 10     # /health, static per second
# public_burst = 20

# ════════════════════════════════════════════════════════════════
# Pulse Configuration (Async Job System)
# ════════════════════════════════════════════════════════════════

[pulse]
# Number of concurrent job workers
# Default: 1 (sequential processing)
workers = 1

# How often to check for scheduled jobs (seconds)
# Default: 1
ticker_interval_seconds = 1

# Node-level budget limits (enforced per-node against aggregate spend)
# Uses sliding windows (24h/7d/30d) on ai_model_usage table
# Default: $3/day, $7/week, $15/month
# daily_budget_usd = 3.0
# weekly_budget_usd = 7.0
# monthly_budget_usd = 15.0
# cost_per_score_usd = 0.002

# Cluster-level budget (enforced against aggregate spend across all synced nodes)
# Effective limit = average of all nodes' configured cluster limits
# 0 = no cluster enforcement (default)
# cluster_daily_budget_usd = 0
# cluster_weekly_budget_usd = 0
# cluster_monthly_budget_usd = 0

# ════════════════════════════════════════════════════════════════
# Code Configuration (GitHub & LSP Integration)
# DEPRECATED: planning for removal of these two integrations
# ════════════════════════════════════════════════════════════════

[code.github]
# GitHub personal access token for code review features
# Required for: qntx code pr, qntx code FIX-N
# Environment: QNTX_CODE_GITHUB_TOKEN
# token = "ghp_..."

[code.gopls]
# Go language server integration
# Workspace root for gopls (default: project root)
# workspace_root = "/path/to/workspace"

# Enable gopls integration
# Default: true
enabled = true

