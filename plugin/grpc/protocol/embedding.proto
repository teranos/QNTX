syntax = "proto3";

package protocol;

option go_package = "github.com/teranos/QNTX/plugin/grpc/protocol";

// EmbeddingService provides text-to-vector embedding operations for plugins
service EmbeddingService {
  // Embed generates a vector embedding for a single text
  rpc Embed(EmbedRequest) returns (EmbedResponse);

  // BatchEmbed generates vector embeddings for multiple texts
  rpc BatchEmbed(BatchEmbedRequest) returns (BatchEmbedResponse);

  // Cluster runs HDBSCAN clustering on a flat array of embeddings
  rpc Cluster(ClusterRequest) returns (ClusterResponse);

  // ModelInfo returns metadata about the loaded embedding model
  rpc ModelInfo(ModelInfoRequest) returns (ModelInfoResponse);

  // GetLabelEligibleClusters returns clusters eligible for labeling
  rpc GetLabelEligibleClusters(GetLabelEligibleClustersRequest) returns (GetLabelEligibleClustersResponse);

  // SampleClusterTexts returns random sample texts from a cluster
  rpc SampleClusterTexts(SampleClusterTextsRequest) returns (SampleClusterTextsResponse);

  // SetClusterLabel sets or updates the label on a cluster
  rpc SetClusterLabel(SetClusterLabelRequest) returns (SetClusterLabelResponse);
}

message EmbedRequest {
  string auth_token = 1;
  string text = 2;
}

message EmbedResponse {
  repeated float vector = 1;
  int32 dimensions = 2;
  string model = 3;
  int32 tokens = 4;
}

message BatchEmbedRequest {
  string auth_token = 1;
  repeated string texts = 2;
}

message BatchEmbedResponse {
  repeated EmbeddingVector results = 1;
  int32 dimensions = 2;
  string model = 3;
  int32 total_tokens = 4;
}

message EmbeddingVector {
  repeated float vector = 1;
  int32 tokens = 2;
}

message GetLabelEligibleClustersRequest {
  string auth_token = 1;
  int32 min_size = 2;
  int32 cooldown_days = 3;
  int32 limit = 4;
}

message GetLabelEligibleClustersResponse {
  repeated EligibleCluster clusters = 1;
}

message EligibleCluster {
  int32 id = 1;
  int32 members = 2;
}

message SampleClusterTextsRequest {
  string auth_token = 1;
  int32 cluster_id = 2;
  int32 sample_size = 3;
}

message SampleClusterTextsResponse {
  repeated string texts = 1;
}

message SetClusterLabelRequest {
  string auth_token = 1;
  int32 cluster_id = 2;
  string label = 3;
}

message SetClusterLabelResponse {}

message ClusterRequest {
  string auth_token = 1;
  repeated float data = 2;
  int32 n_points = 3;
  int32 dimensions = 4;
  int32 min_cluster_size = 5;
}

message ClusterResponse {
  repeated int32 labels = 1;
  repeated float probabilities = 2;
  int32 n_clusters = 3;
  repeated Centroid centroids = 4;
}

message Centroid {
  repeated float vector = 1;
}

message ModelInfoRequest {
  string auth_token = 1;
}

message ModelInfoResponse {
  string name = 1;
  int32 dimensions = 2;
  int32 max_sequence_length = 3;
}
