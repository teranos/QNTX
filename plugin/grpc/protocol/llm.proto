syntax = "proto3";

package protocol;

option go_package = "github.com/teranos/QNTX/plugin/grpc/protocol";

// LLMService provides provider-agnostic LLM access for plugins.
// Provider plugins (OpenRouter, llama.cpp) register as backends.
// Core routes requests to the appropriate provider.
service LLMService {
  rpc Chat(LLMChatRequest) returns (LLMChatResponse);
  rpc StreamChat(LLMChatRequest) returns (stream LLMChatChunk);
}

message LLMChatRequest {
  string system_prompt = 1;
  string user_prompt = 2;
  string model = 3;
  double temperature = 4;
  int32 max_tokens = 5;
  string provider = 6;
  repeated Attachment attachments = 7;
}

message Attachment {
  string mime_type = 1;
  string data = 2;
  string filename = 3;
}

message LLMChatResponse {
  string content = 1;
  string model = 2;
  int32 prompt_tokens = 3;
  int32 completion_tokens = 4;
  int32 total_tokens = 5;
}

// Streaming: one chunk per generated token
message LLMChatChunk {
  string token = 1;                        // The generated token text
  bool done = 2;                           // True on final chunk
  string model = 3;                        // Model name (sent on first or last chunk)
  int32 prompt_tokens = 4;                 // Sent on final chunk
  int32 completion_tokens = 5;             // Sent on final chunk
  int32 total_tokens = 6;                  // Sent on final chunk
  TokenSignalProto signal = 7;             // Per-token signal data (if available)
}

message TokenSignalProto {
  float confidence = 1;                    // P(chosen) from raw distribution
  float entropy = 2;                       // Shannon entropy in bits
  float top_gap = 3;                       // P(top1) - P(top2)
  repeated TokenCandidateProto top_k = 4;  // Top-k candidates
}

message TokenCandidateProto {
  int32 id = 1;
  string text = 2;
  float prob = 3;
}
