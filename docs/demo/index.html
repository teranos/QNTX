<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QNTX Canvas</title>
<style>

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 0;
    background: #1a1b1a;
    color: #dfe1e0;
}

/* Canvas workspace */
.canvas-workspace {
    width: 100%;
    min-height: 100vh;
    position: relative;
    overflow: auto;
    background-color: #2d2e36;
    background-image:
        repeating-linear-gradient(0deg, transparent, transparent 23px, #2f353c 23px, #2f353c 24px),
        repeating-linear-gradient(90deg, transparent, transparent 23px, #2f353c 23px, #2f353c 24px);
}

.canvas-content-layer {
    position: relative;
    min-height: 100vh;
}

/* Glyph base */
.canvas-glyph {
    position: absolute;
    display: flex;
    flex-direction: column;
    background-color: #252625;
    border: 1px solid #3f4140;
    border-radius: 4px;
    overflow: hidden;
}

/* Title bar */
.canvas-glyph-title-bar {
    height: 32px;
    background-color: #2e2f2e;
    border-bottom: 1px solid #3f4140;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 8px;
    flex-shrink: 0;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.7);
}

/* Content */
.glyph-content {
    flex: 1;
    padding: 8px;
    overflow: auto;
    font-size: 13px;
}

.glyph-content pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
    font-family: 'JetBrains Mono', 'SF Mono', 'Monaco', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    color: #d4d4d4;
}

.glyph-content code {
    font-family: 'JetBrains Mono', 'SF Mono', 'Monaco', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
}

/* Query glyphs (AX, SE) */
.glyph-query {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 13px;
    color: #d4d4d4;
}

/* Note glyph (post-it) */
.note-content {
    padding: 4px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.2;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
}

/* Attestation glyph */
.canvas-attestation-glyph {
    background: #1a1b1a;
    border: 1px solid #3f4140;
    border-radius: 3px;
    box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
    color: rgba(255, 255, 255, 0.85);
}

.attestation-content {
    font-family: monospace;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.85);
}

/* Document glyph */
.canvas-doc-glyph {
    border: 1px solid #3f4140;
    border-radius: 3px;
    box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
    color: rgba(255, 255, 255, 0.85);
}

.doc-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #999;
    font-size: 14px;
}

/* Subcanvas glyph */
.canvas-subcanvas-glyph .canvas-glyph-title-bar {
    background: #3a2d5a;
    color: #c0a0e8;
}

.subcanvas-preview {
    flex: 1;
    overflow: hidden;
    background-color: #2d2e36;
    background-image:
        repeating-linear-gradient(0deg, transparent, transparent 9px, rgba(160, 120, 200, 0.08) 9px, rgba(160, 120, 200, 0.08) 10px),
        repeating-linear-gradient(90deg, transparent, transparent 9px, rgba(160, 120, 200, 0.08) 9px, rgba(160, 120, 200, 0.08) 10px);
    min-height: 60px;
}

/* Python glyph title bar accent */
.canvas-py-glyph .canvas-glyph-title-bar {
    background: #2a5578;
}

/* TypeScript glyph title bar accent */
.canvas-ts-glyph .canvas-glyph-title-bar {
    background: #2d4f7c;
}

/* Prompt glyph title bar accent */
.canvas-prompt-glyph .canvas-glyph-title-bar {
    background: #3d2e2e;
}

/* Melded composition */
.melded-composition {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: auto;
    gap: 0;
    position: absolute;
    background: transparent;
}

.melded-composition .canvas-glyph {
    position: relative;
}

/* Responsive: scroll on small screens */
@media (max-width: 768px) {
    .canvas-workspace {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
    }
}

</style>
</head>
<body>
<div class="canvas-workspace">
<div class="canvas-content-layer">
<div class="canvas-note-glyph canvas-glyph" data-glyph-id="note-b4677847-0f6d-49b1-bfa8-6d3d4907ebd3" style="left:562px;top:278px;width:321px;min-height:281px;background-color:#f5edb8;border:1px solid #d4c59a;border-radius:2px;box-shadow:2px 2px 8px rgba(0,0,0,0.15);color:#2a2a2a;">
<div class="glyph-content note-content"># A new Note

Start typing...

for the canvas id test.</div>
</div>

</div>
</div>
</body>
</html>
